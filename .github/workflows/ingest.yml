name: Ingest & notify

# Free-tier replacement for Cloud Scheduler + Cloud Functions: runs the ingest +
# notification cycle on a cron using the Admin SDK. Also runnable on demand.
on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours (UTC)
  workflow_dispatch: {}

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Node deps
        working-directory: functions
        run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Eventim (pyventim) deps
        run: pip install -r eventim/requirements.txt

      # Materialize the service-account key from a secret for ADC.
      - name: Write service account
        run: echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Export the catalog names, then fetch Eventim events for them (Python).
      - name: Export catalog
        working-directory: functions
        run: npm run export-catalog -- "$RUNNER_TEMP/catalog.json"

      - name: Fetch Eventim (pyventim)
        run: >
          python eventim/fetch_eventim.py
          --catalog "$RUNNER_TEMP/catalog.json"
          --out "$RUNNER_TEMP/eventim_raw.json"
          --markets "${{ vars.EVENTIM_MARKETS || 'GERMANY,FRANCE,NETHERLANDS,BELGIUM,AUSTRIA,SWITZERLAND' }}"
        continue-on-error: true # Eventim is best-effort; never block Ticketmaster ingest

      - name: Run ingest + notify
        working-directory: functions
        run: npm run ingest
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
          EVENTIM_RAW_PATH: ${{ runner.temp }}/eventim_raw.json
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          BANDSINTOWN_APP_ID: ${{ secrets.BANDSINTOWN_APP_ID }}
          EUROFEST_TM_AFFILIATE: ${{ secrets.EUROFEST_TM_AFFILIATE }}
          EUROFEST_EVENTIM_AFFILIATE: ${{ secrets.EUROFEST_EVENTIM_AFFILIATE }}
          EUROFEST_SKIDDLE_AFFILIATE: ${{ secrets.EUROFEST_SKIDDLE_AFFILIATE }}
          EUROFEST_DICE_AFFILIATE: ${{ secrets.EUROFEST_DICE_AFFILIATE }}
